<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Uzay AR Projesi</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
    </style>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: resim_video/targets1.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">

      <a-assets>
        <video id="uzay-video" src="resim_video/uzay.mp4" preload="auto" loop crossorigin="anonymous" playsinline webkit-playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#uzay-video" width="1" height="0.56" position="0 0 0"></a-video>
      </a-entity>

    </a-scene>

    <script>
      const target = document.querySelector('[mindar-image-target="targetIndex: 0"]');
      const video = document.querySelector('#uzay-video');

      target.addEventListener("targetFound", event => {
        video.play();
      });

      target.addEventListener("targetLost", event => {
        video.pause();
      });
    </script>
  </body>
</html>
