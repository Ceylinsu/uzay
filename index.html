<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uzay AR Deneyimi</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        /* Başlat butonu: Tarayıcıların videoyu oynatması için bir kez tıklama şarttır */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 999; color: white;
        }
        button {
            padding: 15px 30px; font-size: 18px; cursor: pointer;
            background: #00d2ff; border: none; border-radius: 50px; color: black; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="startButton">UZAYI BAŞLAT</button>
        <p>Butona bas ve kamerayı uzay resmine tut.</p>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets2.mind; autoStart: true;" 
             color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="uzayVideo" src="./uzay.mp4" preload="auto" loop="true" 
                   crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#uzayVideo" width="1" height="0.56" position="0 0 0"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const startButton = document.querySelector("#startButton");
        const overlay = document.querySelector("#overlay");
        const video = document.querySelector("#uzayVideo");

        // Kullanıcı butona basmadan video sesli şekilde başlayamaz (Tarayıcı kuralı)
        startButton.addEventListener('click', () => {
            overlay.style.display = "none";
            video.play();
            video.pause(); // Hazırda bekletiyoruz, resim bulununca devam edecek
        });

        // Resim bulunduğunda videoyu oynat, kaybolduğunda durdur
        const target = document.querySelector('[mindar-image-target]');
        target.addEventListener("targetFound", () => { video.play(); });
        target.addEventListener("targetLost", () => { video.pause(); });
    </script>
</body>
</html>
